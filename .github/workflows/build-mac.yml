name: Build macOS Installer

# Build-only workflow for testing. Release uploads are handled by release.yml.
on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare scripts
        run: |
          chmod +x mac/scripts/postinstall
          cp source/statusline.mjs mac/scripts/statusline.mjs
          cp source/configure-statusline.js mac/scripts/configure-statusline.js

      - name: Build .pkg
        run: |
          pkgbuild \
            --nopayload \
            --scripts mac/scripts \
            --identifier com.claudecode.launchpad \
            --version test \
            --install-location / \
            ClaudeCode_Launchpad_CLI_Setup_mac.pkg

      - name: Test .pkg structure
        run: |
          pkgutil --payload-files ClaudeCode_Launchpad_CLI_Setup_mac.pkg || true
          pkgutil --check-signature ClaudeCode_Launchpad_CLI_Setup_mac.pkg || true
          echo "Package built successfully: $(ls -lh ClaudeCode_Launchpad_CLI_Setup_mac.pkg)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudecode-launchpad-mac
          path: ClaudeCode_Launchpad_CLI_Setup_mac.pkg
