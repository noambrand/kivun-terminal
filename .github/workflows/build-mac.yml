name: Build macOS Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare scripts
        run: |
          chmod +x mac/scripts/postinstall
          cp source/statusline.mjs mac/scripts/statusline.mjs
          cp source/configure-statusline.js mac/scripts/configure-statusline.js

      - name: Build .pkg
        run: |
          pkgbuild \
            --nopayload \
            --scripts mac/scripts \
            --identifier com.claudecode.launchpad \
            --version "${{ github.ref_name }}" \
            --install-location / \
            "ClaudeCode_Launchpad_CLI_Setup_${{ github.ref_name }}.pkg"

      - name: Test .pkg structure
        run: |
          pkgutil --payload-files "ClaudeCode_Launchpad_CLI_Setup_${{ github.ref_name }}.pkg" || true
          pkgutil --check-signature "ClaudeCode_Launchpad_CLI_Setup_${{ github.ref_name }}.pkg" || true
          echo "Package built successfully: $(ls -lh ClaudeCode_Launchpad_CLI_Setup_*.pkg)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudecode-launchpad-mac
          path: "ClaudeCode_Launchpad_CLI_Setup_*.pkg"

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "ClaudeCode_Launchpad_CLI_Setup_*.pkg"
          fail_on_unmatched_files: false
          make_latest: true
